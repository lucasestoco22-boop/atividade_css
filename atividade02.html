<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alinhando Texto</title>
    <style>
        .primeiro {
            text-align: left;
        }
        .segundo {
            text-align: center;
        }
        .terceiro {
            text-align: right;
        }
    </style>
</head>
<body>
    <p class="primeiro">I know</p>
    <p class="segundo">Nothing could matter</p>
    <p class="terceiro">But I wish I could be better from you</p>
</body>
</html>
